
services:
  db:
    image: postgres:16-alpine
    container_name: amazon_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-amazon_research}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-amazon_research}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: amazon_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: amazon_backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      # Shared storage volumes - must be same as worker
      - exports_data:/app/exports
      - logs_data:/app/logs
      - screenshots_data:/app/screenshots
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-amazon_research}
      - REDIS_URL=redis://redis:6379/0
      - PLAYWRIGHT_HEADLESS=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: amazon_worker
    restart: always
    command: celery -A app.tasks.celery_worker.celery_app worker --loglevel=info -c 2 --without-heartbeat
    volumes:
      - ./backend:/app
      # Shared storage volumes - must be same as backend
      - exports_data:/app/exports
      - logs_data:/app/logs
      - screenshots_data:/app/screenshots
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-amazon_research}
      - REDIS_URL=redis://redis:6379/0
      - PLAYWRIGHT_HEADLESS=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: amazon_frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - NODE_ENV=development
    depends_on:
      - backend

volumes:
  postgres_data:
  exports_data:
  logs_data:
  screenshots_data:
